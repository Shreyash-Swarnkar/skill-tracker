<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center mb-3">Login</h3>

        <!-- NORMAL LOGIN -->
        <form method="POST">
            <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
            <button class="btn btn-primary w-100">Login</button>
        </form>

        <div class="text-center my-3">OR</div>

        <!-- GOOGLE LOGIN -->
        <button onclick="googleLogin()" class="btn btn-danger w-100">
            🔴 Login with Google
        </button>

        <p class="mt-3 text-center">
            Don't have an account? <a href="/register">Register</a>
        </p>
    </div>

    <!-- FIREBASE (MODERN VERSION) -->
    <script type="module">

        // ✅ Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // ✅ YOUR CONFIG (PASTE YOURS HERE)
        const firebaseConfig = {
            apiKey: "AIzaSyCNVqD7P1k9ChJjSU34Ogdm_ImqrBxWt-8",
            authDomain: "skill-tracker-d999b.firebaseapp.com",
            projectId: "skill-tracker-d999b",
            storageBucket: "skill-tracker-d999b.firebasestorage.app",
            messagingSenderId: "422542205511",
            appId: "1:422542205511:web:4b327b3f71408b752c0762",
            measurementId: "G-WRVT7PFEP3"
        };


        // ✅ Initialize
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ✅ Google Login Function
        window.googleLogin = function () {
            const provider = new GoogleAuthProvider();

            signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;

                    // Send data to Flask backend
                    fetch("/google_login", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            email: user.email
                        })
                    }).then(() => {
                        window.location.href = "/dashboard";
                    });

                })
                .catch((error) => {
                    alert(error.message);
                });
        };

    </script>

</body>

</html>
