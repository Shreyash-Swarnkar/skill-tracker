<!DOCTYPE html>
<html>
<head>
    <title>Edit Skill</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 400px;">
    <h3 class="text-center mb-3">Edit Skill</h3>

    <form method="POST">
        <input type="text" name="name" class="form-control mb-3" value="{{ skill[2] }}" required>

        <input type="number" name="progress" class="form-control mb-3" value="{{ skill[3] }}" required>

        <button class="btn btn-primary w-100">Update</button>
    </form>

    <a href="/dashboard" class="mt-3 text-center d-block">Back</a>
</div>

</body>
</html>
