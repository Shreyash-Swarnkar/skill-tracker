<!DOCTYPE html>
<html>

<head>
    <title>Edit Skill</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/style.css">

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card {
            padding: 30px;
            border-radius: 15px;
            width: 350px;
        }
    </style>
</head>

<body>

    <div class="card shadow">

        <h3 class="text-center mb-4">✏️ Edit Skill</h3>

        <!-- FORM -->
        <form method="POST">

            <input type="text" name="name" class="form-control mb-3" value="{{ skill[2] }}" placeholder="Skill Name"
                required>

            <input type="number" name="progress" class="form-control mb-3" value="{{ skill[3] }}"
                placeholder="Progress %" required>

            <button class="btn btn-warning w-100 mb-2">
                Update Skill
            </button>

        </form>

        <a href="/dashboard" class="btn btn-secondary w-100">
            Back
        </a>

    </div>

</body>

</html>
